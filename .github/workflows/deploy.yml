name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from Secrets
        run: |
          printf 'export const CONFIG = {\n  CLIENT_ID: "%s",\n  SCHOOL_DOMAIN: "%s",\n  SHEETS_ID: "%s",\n  PRIVATE_SHEETS_ID: "%s",\n  API_KEY: "%s",\n};\n' \
            "${{ secrets.CLIENT_ID }}" \
            "${{ secrets.SCHOOL_DOMAIN }}" \
            "${{ secrets.SHEETS_ID }}" \
            "${{ secrets.PRIVATE_SHEETS_ID }}" \
            "${{ secrets.API_KEY }}" \
          > src/config.js
          echo "config.js 생성 완료"
          cat src/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
